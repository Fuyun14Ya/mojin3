            </div>

<script>
    // ================================================================
    //  私有 API 模拟（保持不变）
    // ================================================================
    if (!window.wusiStorage) {
        window.wusiStorage = {
            _prefix: 'jaye_',
            getItem(key) {
                try {
                    const raw = localStorage.getItem(this._prefix + key);
                    if (raw === null) return null;
                    return JSON.parse(raw);
                } catch(_) { return null; }
            },
            async setItem(key, value) {
                localStorage.setItem(this._prefix + key, JSON.stringify(value));
            },
            async removeItem(key) {
                localStorage.removeItem(this._prefix + key);
            },
            async clear() {
                const keys = Object.keys(localStorage).filter(k => k.startsWith(this._prefix));
                keys.forEach(k => localStorage.removeItem(k));
            },
            getAll() {
                const result = {};
                const prefix = this._prefix;
                for (let key in localStorage) {
                    if (key.startsWith(prefix)) {
                        try { result[key.slice(prefix.length)] = JSON.parse(localStorage[key]); } catch(_) {}
                    }
                }
                return result;
            }
        };
    }

    if (!window.wusiFile) {
        window.wusiFile = {
            _dbName: 'jaye_files',
            _storeName: 'files',
            async _getDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this._dbName, 1);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(this._storeName)) {
                            db.createObjectStore(this._storeName, { keyPath: 'name' });
                        }
                    };
                    request.onsuccess = (event) => resolve(event.target.result);
                    request.onerror = () => reject(request.error);
                });
            },
            async save(filename, src) {
                const db = await this._getDB();
                let data;
                if (src instanceof Blob || src instanceof File) {
                    data = src;
                } else if (typeof src === 'string' && src.startsWith('data:')) {
                    const res = await fetch(src);
                    data = await res.blob();
                } else if (typeof src === 'string' && (src.startsWith('http') || src.startsWith('//'))) {
                    const res = await fetch(src);
                    data = await res.blob();
                } else {
                    throw new Error('Unsupported src type');
                }
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this._storeName, 'readwrite');
                    const store = tx.objectStore(this._storeName);
                    store.put({ name: filename, blob: data });
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async read(filename) {
                const db = await this._getDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this._storeName, 'readonly');
                    const store = tx.objectStore(this._storeName);
                    const request = store.get(filename);
                    request.onsuccess = () => {
                        if (request.result) resolve(request.result.blob);
                        else reject(new Error('File not found: ' + filename));
                    };
                    request.onerror = () => reject(request.error);
                });
            },
            async delete(filename) {
                const db = await this._getDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this._storeName, 'readwrite');
                    const store = tx.objectStore(this._storeName);
                    store.delete(filename);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async list(ext) {
                const db = await this._getDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this._storeName, 'readonly');
                    const store = tx.objectStore(this._storeName);
                    const request = store.getAllKeys();
                    request.onsuccess = () => {
                        let names = request.result || [];
                        if (ext) names = names.filter(n => n.endsWith(ext));
                        resolve(names);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
        };
    }

    // ================================================================
    //  数据层
    // ================================================================
    const STORAGE_KEY = 'jaye_navigation_data';
    const SETTINGS_KEY = 'jaye_settings';
    const BACKUP_KEY = STORAGE_KEY + '_backup';
    const DEFAULT_MAPBOOKS = ['厄运之女', '消融的雪国', '磷光症', '罪之华'];
    const DEFAULT_DIFFICULTIES = ['新手', '简单', '普通', '困难', '噩梦'];

    function splitSteps(text) {
        return text.split(/[，。]/).map(s => s.trim()).filter(s => s.length > 0);
    }

    function getAliases(shape) {
        const aliases = [shape];
        const short = shape.replace(/门$/, '');
        if (short && short !== shape) aliases.push(short);
        return aliases;
    }

    function genId() {
        return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
    }

    function getMapName(idx) {
        const d = app.data;
        return (d.mapBooks && d.mapBooks[idx]) ? d.mapBooks[idx] : '未知地图';
    }

    function getDiffName(idx) {
        const d = app.data;
        return (d.difficulties && d.difficulties[idx]) ? d.difficulties[idx] : '未知难度';
    }

    function getNodesFor(mapIdx, diffIdx) {
        return app.data.nodes.filter(n => n.mapBookIndex === mapIdx && n.difficultyIndex === diffIdx);
    }

    function getNodeById(id) {
        return app.data.nodes.find(n => n.id === id);
    }

    function deleteNode(id) {
        const idx = app.data.nodes.findIndex(n => n.id === id);
        if (idx !== -1) {
            const node = app.data.nodes[idx];
            if (node.thumbnail && !node.thumbnail.startsWith('http')) wusiFile.delete(node.thumbnail).catch(()=>{});
            if (node.fullMap) wusiFile.delete(node.fullMap).catch(()=>{});
            app.data.nodes.splice(idx, 1);
            saveData(app.data).catch(() => {});
        }
    }

    // ================================================================
    //  数据加载与保存
    // ================================================================
    function loadData() {
        let raw = null;
        try {
            raw = wusiStorage.getItem(STORAGE_KEY);
        } catch (_) {}
        if (typeof raw === 'string') {
            try { raw = JSON.parse(raw); } catch(_) { raw = null; }
        }
        if (raw && raw.nodes && Array.isArray(raw.nodes)) {
            raw.nodes = raw.nodes.map(n => ({
                ...n,
                aliases: n.aliases || [],
                steps: n.steps || [],
                thumbnail: n.thumbnail || '',
                fullMap: n.fullMap || ''
            }));
            return raw;
        }
        try {
            const backup = wusiStorage.getItem(BACKUP_KEY);
            if (backup && backup.nodes && Array.isArray(backup.nodes)) {
                backup.nodes = backup.nodes.map(n => ({
                    ...n,
                    aliases: n.aliases || [],
                    steps: n.steps || [],
                    thumbnail: n.thumbnail || '',
                    fullMap: n.fullMap || ''
                }));
                wusiStorage.setItem(STORAGE_KEY, backup).catch(()=>{});
                return backup;
            }
        } catch(_) {}
        const def = getDefaultData();
        wusiStorage.setItem(STORAGE_KEY, def).catch(()=>{});
        return def;
    }

    async function saveData(data, retries = 3) {
        for (let i = 0; i < retries; i++) {
            try {
                await wusiStorage.setItem(STORAGE_KEY, data);
                await wusiStorage.setItem(BACKUP_KEY, data);
                return;
            } catch (e) {
                console.warn('数据保存失败，重试', i + 1, e.message);
                if (i < retries - 1) {
                    await new Promise(r => setTimeout(r, 100));
                }
            }
        }
        showToast('数据保存失败，请检查环境');
    }

    function loadSettings() {
        let raw = null;
        try {
            raw = wusiStorage.getItem(SETTINGS_KEY);
        } catch(_) {}
        if (typeof raw === 'string') try { raw = JSON.parse(raw); } catch(_) { raw = null; }
        if (raw) {
            return {
                speed: raw.speed ?? 1.0,
                pitch: raw.pitch ?? 1.0,
                voiceName: raw.voiceName ?? '',
                customVoice: raw.customVoice ?? '',
                imageBaseUrl: raw.imageBaseUrl || ''
            };
        }
        return { speed: 1.0, pitch: 1.0, voiceName: '', customVoice: '', imageBaseUrl: '' };
    }

    function saveSettings(settings) {
        wusiStorage.setItem(SETTINGS_KEY, settings).catch(e => {
            showToast('设置保存失败: ' + e.message);

    }

    // ================================================================
    //  文件辅助
    // ================================================================
    async function loadFileAsBlobURL(filename) {
        if (!filename) return '';
        if (filename.startsWith('http')) {
            try {
                const resp = await fetch(filename);
                if (!resp.ok) throw new Error('Network error');
                const blob = await resp.blob();
                return URL.createObjectURL(blob);
            } catch (e) {
                console.warn('加载网络图片失败:', filename, e);
                return '';
            }
        }
        try {
            const blob = await wusiFile.read(filename);
            return URL.createObjectURL(blob);
        } catch (e) {
            console.warn('读取文件失败:', filename, e);
            return '';
        }
    }

    async function loadFileAsDataURL(filename) {
        if (!filename) return '';
        if (filename.startsWith('http')) {
            try {
                const resp = await fetch(filename);
                const blob = await resp.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(reader.error);
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                return '';
            }
        }
        try {
            const blob = await wusiFile.read(filename);
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(reader.error);
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            return '';
        }
    }

    function generateFileName(ext) {
        const now = new Date();
        const ts = now.getFullYear() +
            String(now.getMonth()+1).padStart(2,'0') +
            String(now.getDate()).padStart(2,'0') + '_' +
            String(now.getHours()).padStart(2,'0') +
            String(now.getMinutes()).padStart(2,'0') +
            String(now.getSeconds()).padStart(2,'0') + '_' +
            Math.random().toString(36).slice(2,6);
        return ts + ext;
    }

    // ================================================================
    //  全屏缩放模态层（保持不变）
    // ================================================================
    let zoomState = { scale: 1, tx: 0, ty: 0 };
    let zoomTouchStartState = {};
    let zoomTouchStartDist = 0;
    let zoomTouchStartX = 0, zoomTouchStartY = 0;
    let zoomLastTapTime = 0;
    let zoomEventsBound = false;

    function getDistance(t1, t2) {
        const dx = t1.clientX - t2.clientX;
        const dy = t1.clientY - t2.clientY;
        return Math.sqrt(dx*dx + dy*dy);
    }

    function applyZoomTransform() {
        const img = document.getElementById('zoomMapImg');
        img.style.transform = `translate(${zoomState.tx}px, ${zoomState.ty}px) scale(${zoomState.scale})`;
    }

    function onZoomTouchStart(e) {
        e.preventDefault();
        const touches = e.touches;
        const now = Date.now();

        if (touches.length === 2) {
            zoomTouchStartDist = getDistance(touches[0], touches[1]);
            zoomTouchStartState = { scale: zoomState.scale, tx: zoomState.tx, ty: zoomState.ty };
            zoomLastTapTime = 0;
        } else if (touches.length === 1) {
            zoomTouchStartState = { scale: zoomState.scale, tx: zoomState.tx, ty: zoomState.ty };
            zoomTouchStartX = touches[0].clientX;
            zoomTouchStartY = touches[0].clientY;

            if (now - zoomLastTapTime < 300) {
                if (zoomState.scale === 1) {
                    zoomState.scale = 2;
                    zoomState.tx = 0;
                    zoomState.ty = 0;
                } else {
                    zoomState.scale = 1;
                    zoomState.tx = 0;
                    zoomState.ty = 0;
                }
                applyZoomTransform();
                zoomLastTapTime = 0;
                return;
            }
            zoomLastTapTime = now;
        }
    }

    function onZoomTouchMove(e) {
        e.preventDefault();
        const touches = e.touches;
        if (touches.length === 2) {
            const dist = getDistance(touches[0], touches[1]);
            if (zoomTouchStartDist > 0) {
                const factor = dist / zoomTouchStartDist;
                zoomState.scale = Math.min(4, Math.max(0.5, zoomTouchStartState.scale * factor));
                applyZoomTransform();
            }
        } else if (touches.length === 1) {
            const dtX = touches[0].clientX - zoomTouchStartX;
            const dtY = touches[0].clientY - zoomTouchStartY;
            zoomState.tx = zoomTouchStartState.tx + dtX;
            zoomState.ty = zoomTouchStartState.ty + dtY;
            applyZoomTransform();
        }
    }

    function onZoomTouchEnd(e) {
        zoomTouchStartDist = 0;
    }

    function bindZoomEvents() {
        if (zoomEventsBound) return;
        const img = document.getElementById('zoomMapImg');
        img.addEventListener('touchstart', onZoomTouchStart, { passive: false });
        img.addEventListener('touchmove', onZoomTouchMove, { passive: false });
        img.addEventListener('touchend', onZoomTouchEnd, { passive: false });
        zoomEventsBound = true;
    }

    function unbindZoomEvents() {
        if (!zoomEventsBound) return;
        const img = document.getElementById('zoomMapImg');
        img.removeEventListener('touchstart', onZoomTouchStart);
        img.removeEventListener('touchmove', onZoomTouchMove);
        img.removeEventListener('touchend', onZoomTouchEnd);
        zoomEventsBound = false;
    }

    function openZoomMap(url) {

    function closeZoomMap() {

    // ================================================================
    //  渲染节点列表（按方向分组），缩略图自动 fallback 到完整地图
    // ================================================================
    async function renderNodeList(mapIdx, diffIdx) {
        document.getElementById('nodeListTitle').textContent = `${getMapName(mapIdx)} · ${getDiffName(diffIdx)}`;
        const container = document.getElementById('nodeListContainer');
        const nodes = getNodesFor(mapIdx, diffIdx);

        if (nodes.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">📭</div>暂无节点，点击「添加节点」创建<div class="hint">方向+形状，例如「右锤子门」</div></div>`;
        } else {
            const groups = {};
            const dirOrder = ['左', '右', '南', '北', '东', '西', '其他'];
            nodes.forEach(node => {
                const dir = node.direction || '其他';
                if (!groups[dir]) groups[dir] = [];
                groups[dir].push(node);
            });
            const sortedEntries = Object.entries(groups).sort((a, b) => {
                const ia = dirOrder.indexOf(a[0]);
                const ib = dirOrder.indexOf(b[0]);
                if (ia === -1 && ib === -1) return a[0].localeCompare(b[0]);
                if (ia === -1) return 1;
                if (ib === -1) return -1;
                return ia - ib;
            });

            let html = '';
            for (const [dir, dirNodes] of sortedEntries) {
                html += `<div class="group-divider">${dir} <span class="badge">${dirNodes.length}个</span></div>`;
                for (const node of dirNodes) {
                    const stepPrev = (node.steps && node.steps.length > 0) ? node.steps[0] + (node.steps.length > 1 ? ` 等${node.steps.length}步` : '') : '无步骤';
                    const aliasStr = (node.aliases || []).join('、') || '无';
                    html += `<div class="node-item-wrap">
                        <div class="node-item" data-node-id="${node.id}">
                            <div class="thumb" id="thumb-${node.id}"><span>📷</span></div>
                            <div class="info">
                                <div class="name">${node.direction} · ${node.shape}</div>
                                <div class="meta">别名: ${aliasStr}</div>
                                <div class="steps-preview">${stepPrev}</div>
                            </div>
                            <div class="actions">
                                <button class="edit-node-btn" data-node-id="${node.id}">✎</button>
                                <button class="delete-node-btn" data-node-id="${node.id}" data-name="${node.direction}${node.shape}">✕</button>
                            </div>
                        </div>
                    </div>`;
                }
            }
            container.innerHTML = html;

            // 加载缩略图（自动 fallback 到完整地图）
            for (const node of nodes) {
                await loadThumbnailForNode(node);
            }

            container.querySelectorAll('.node-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.actions')) return;
                    startNavigation(el.dataset.nodeId);
                });
            });
            container.querySelectorAll('.edit-node-btn').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); openEditNode(btn.dataset.nodeId); });
            });
            container.querySelectorAll('.delete-node-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.nodeId;
                    const name = btn.dataset.name;
                    if (confirm(`确定删除「${name}」吗？`)) {
                        deleteNode(id);
                        renderNodeList(mapIdx, diffIdx);
                    }
                });
            });
        }

        document.getElementById('nodeListAddBtn').onclick = () => {
            openEditNode(null, mapIdx, diffIdx);
        };
        document.getElementById('nodeListBack').onclick = () => {
            renderMapDetail(mapIdx);
            showMapPage('page-map-detail');
        };
        const syncBtn = document.getElementById('syncThumbBtn');
        syncBtn.onclick = () => { batchSyncThumbnails(mapIdx, diffIdx); };
        syncBtn.style.display = app.settings.imageBaseUrl ? 'inline-flex' : 'none';
    }

    // ================================================================
    //  缩略图加载：优先 thumbnail，若为空且 fullMap 存在则使用 fullMap
    // ================================================================
    async function loadThumbnailForNode(node) {
        const thumbId = `thumb-${node.id}`;
        const thumbDiv = document.getElementById(thumbId);
        if (!thumbDiv) return;
        if (thumbDiv.querySelector('img')) return;

        let source = node.thumbnail;
        // 如果缩略图为空，但完整地图存在，则 fallback 到完整地图
        if (!source && node.fullMap) {
            source = node.fullMap;
        }
        if (!source) return;

        const url = await loadFileAsBlobURL(source);
        if (url) {
            thumbDiv.innerHTML = `<img src="${url}" alt="缩略图">`;
            app.objectURLs[source] = url;
        }
    }

    // ================================================================
    //  批量同步缩略图（同样 fallback）
    // ================================================================
    async function batchSyncThumbnails(mapIdx, diffIdx) {
        const baseUrl = app.settings.imageBaseUrl;
        if (!baseUrl) {
            showToast('请先在设置中填写图片源URL');
            return;
        }
        const nodes = getNodesFor(mapIdx, diffIdx);
        let success = 0, fail = 0;
        const progress = document.getElementById('syncProgress');
        if (progress) progress.textContent = '同步中...';

        for (const node of nodes) {
            let source = node.thumbnail || node.fullMap;
            if (!source) continue;
            // 如果是完整URL，直接fetch并保存
            if (source.startsWith('http')) {
                try {
                    const resp = await fetch(source);
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const blob = await resp.blob();
                    if (blob.size < 100) throw new Error('图片过小');
                    const filename = 'url_' + node.id + '.jpg';
                    await wusiFile.save(filename, blob);
                    // 如果原来缩略图为空，则将 filename 设为缩略图
                    if (!node.thumbnail) {
                        node.thumbnail = filename;
                        await saveData(app.data);
                    }
                    success++;
                } catch (err) {
                    fail++;
                }
                continue;
            }
            // 拼接基础URL
            const fullUrl = baseUrl + source;
            try {
                const resp = await fetch(fullUrl);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const blob = await resp.blob();
                if (blob.size < 100) throw new Error('图片过小');
                await wusiFile.save(source, blob);
                success++;
            } catch (err) {
                console.warn('下载失败:', source, err);
                fail++;
            }
        }
        if (progress) progress.textContent = `完成：成功 ${success}，失败 ${fail}`;
        showToast(`同步完成：成功 ${success}，失败 ${fail}`);
        renderNodeList(mapIdx, diffIdx);
    }

    // ================================================================

        const node = nodeId ? getNodeById(nodeId) : null;

        document.getElementById('editPageTitle').textContent = node ? `编辑 · ${node.direction}${node.shape}` : '新建节点';

        ).join('');

        let thumbDataURL = '';

        // ---- 复制完整地图到缩略图 ----

    // ================================================================
    //  截取模态框（保持不变）
    // ================================================================
    let cropState = {
        isDragging: false,
        startX: 0, startY: 0,
        endX: 0, endY: 0,
        img: null,
        imgNaturalWidth: 0,
        imgNaturalHeight: 0,
        displayScale: 1,
        canvas: null,
        ctx: null,
        onConfirm: null
    };

    function openCropModal(imgUrl, onConfirm) {
        const modal = document.getElementById('cropModal');
        const canvas = document.getElementById('cropCanvas');
        const ctx = canvas.getContext('2d');

        cropState.canvas = canvas;
        cropState.ctx = ctx;
        cropState.onConfirm = onConfirm;
        cropState.isDragging = false;
        cropState.startX = 0;
        cropState.startY = 0;
        cropState.endX = 0;
        cropState.endY = 0;

        const img = new Image();
        img.onload = () => {
            cropState.img = img;
            cropState.imgNaturalWidth = img.naturalWidth;
            cropState.imgNaturalHeight = img.naturalHeight;
            fitImageToCanvas();
            drawCanvas();
            modal.classList.add('show');
        };
        img.onerror = () => {
            showToast('图片加载失败');
        };
        img.src = imgUrl;
    }

    function fitImageToCanvas() {
        const canvas = cropState.canvas;
        const img = cropState.img;
        if (!img) return;
        const container = document.getElementById('cropModalBody');
        const maxW = container.clientWidth - 20 || window.innerWidth - 60;
        const maxH = container.clientHeight - 20 || window.innerHeight * 0.6;
        const scaleX = maxW / img.naturalWidth;
        const scaleY = maxH / img.naturalHeight;
        cropState.displayScale = Math.min(scaleX, scaleY, 1.5);
        const w = img.naturalWidth * cropState.displayScale;
        const h = img.naturalHeight * cropState.displayScale;
        canvas.width = w;
        canvas.height = h;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
    }

    function drawCanvas() {
        const ctx = cropState.ctx;
        const canvas = cropState.canvas;
        const img = cropState.img;
        if (!img) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        if (cropState.isDragging || (cropState.startX !== cropState.endX && cropState.startY !== cropState.endY)) {
            const x = Math.min(cropState.startX, cropState.endX);
            const y = Math.min(cropState.startY, cropState.endY);
            const w = Math.abs(cropState.endX - cropState.startX);
            const h = Math.abs(cropState.endY - cropState.startY);
            if (w > 2 && h > 2) {
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 4]);
                ctx.strokeRect(x, y, w, h);
                ctx.restore();
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(x+4, y-22, 80, 20);
                ctx.fillStyle = '#fff';
                ctx.font = '11px sans-serif';
                ctx.fillText(`${Math.round(w/cropState.displayScale)}×${Math.round(h/cropState.displayScale)}`, x+8, y-6);
                ctx.restore();
            }
        }
    }

    document.getElementById('cropCanvas').addEventListener('mousedown', (e) => {
        const rect = cropState.canvas.getBoundingClientRect();
        const scaleX = cropState.canvas.width / rect.width;
        const scaleY = cropState.canvas.height / rect.height;
        cropState.startX = (e.clientX - rect.left) * scaleX;
        cropState.startY = (e.clientY - rect.top) * scaleY;
        cropState.endX = cropState.startX;
        cropState.endY = cropState.startY;
        cropState.isDragging = true;
        drawCanvas();
    });

    document.addEventListener('mousemove', (e) => {
        if (!cropState.isDragging) return;
        const rect = cropState.canvas.getBoundingClientRect();
        const scaleX = cropState.canvas.width / rect.width;
        const scaleY = cropState.canvas.height / rect.height;
        cropState.endX = Math.min(Math.max((e.clientX - rect.left) * scaleX, 0), cropState.canvas.width);
        cropState.endY = Math.min(Math.max((e.clientY - rect.top) * scaleY, 0), cropState.canvas.height);
        drawCanvas();
    });

    document.addEventListener('mouseup', () => {
        if (cropState.isDragging) {
            cropState.isDragging = false;
            drawCanvas();
        }
    });

    document.getElementById('cropCanvas').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = cropState.canvas.getBoundingClientRect();
        const scaleX = cropState.canvas.width / rect.width;
        const scaleY = cropState.canvas.height / rect.height;
        cropState.startX = (touch.clientX - rect.left) * scaleX;
        cropState.startY = (touch.clientY - rect.top) * scaleY;
        cropState.endX = cropState.startX;
        cropState.endY = cropState.startY;
        cropState.isDragging = true;
        drawCanvas();
    }, { passive: false });

    document.getElementById('cropCanvas').addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!cropState.isDragging) return;
        const touch = e.touches[0];
        const rect = cropState.canvas.getBoundingClientRect();
        const scaleX = cropState.canvas.width / rect.width;
        const scaleY = cropState.canvas.height / rect.height;
        cropState.endX = Math.min(Math.max((touch.clientX - rect.left) * scaleX, 0), cropState.canvas.width);
        cropState.endY = Math.min(Math.max((touch.clientY - rect.top) * scaleY, 0), cropState.canvas.height);
        drawCanvas();
    }, { passive: false });

    document.getElementById('cropCanvas').addEventListener('touchend', (e) => {
        e.preventDefault();
        if (cropState.isDragging) {
            cropState.isDragging = false;
            drawCanvas();
        }
    }, { passive: false });

    document.getElementById('confirmCropBtn').onclick = () => {
        const canvas = cropState.canvas;
        const ctx = cropState.ctx;
        const x = Math.min(cropState.startX, cropState.endX);
        const y = Math.min(cropState.startY, cropState.endY);
        const w = Math.abs(cropState.endX - cropState.startX);
        const h = Math.abs(cropState.endY - cropState.startY);
        if (w < 4 || h < 4) {
            showToast('请拖拽选择有效区域');
            return;
        }
        const imageData = ctx.getImageData(x, y, w, h);
        const cropCanvas = document.createElement('canvas');
        cropCanvas.width = w;
        cropCanvas.height = h;
        const cropCtx = cropCanvas.getContext('2d');
        cropCtx.putImageData(imageData, 0, 0);
        cropCanvas.toBlob((blob) => {
            if (blob && cropState.onConfirm) {
                cropState.onConfirm(blob);
            } else {
                showToast('截取失败');
            }
            closeCropModal();
        }, 'image/jpeg', 0.92);
    };

    document.getElementById('cancelCropBtn').onclick = closeCropModal;
    document.getElementById('closeCropModal').onclick = closeCropModal;
    document.getElementById('cropModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeCropModal();
    });

    function closeCropModal() {
        document.getElementById('cropModal').classList.remove('show');
        cropState.isDragging = false;
        cropState.onConfirm = null;
        if (cropState.img) {
            cropState.img = null;
        }
    }

    window.addEventListener('resize', () => {
        if (document.getElementById('cropModal').classList.contains('show')) {
            fitImageToCanvas();
            drawCanvas();
        }
    });

    // ================================================================
    //  保存节点表单（支持完整URL和 fallback）
    // ================================================================
    function saveNodeForm() {
        const direction = document.getElementById('editDirection').value.trim();
        const shape = document.getElementById('editShape').value.trim();
        const mapIdx = parseInt(document.getElementById('editMapIdx').value);
        const diffIdx = parseInt(document.getElementById('editDiffIdx').value);
        const aliasesRaw = document.getElementById('editAliases').value.trim();
        const stepsRaw = document.getElementById('editSteps').value.trim();

        if (!direction || !shape) { showToast('方向或形状不能为空'); return; }

        const aliases = aliasesRaw ? aliasesRaw.split('\n').map(s => s.trim()).filter(s => s.length > 0) : [];
        const steps = stepsRaw ? stepsRaw.split('\n').map(s => s.trim()).filter(s => s.length > 0) : [];

        const thumbInput = document.getElementById('editThumbInput');
        const fullmapInput = document.getElementById('editFullmapInput');
        let thumbFilename = thumbInput.dataset.filename || '';
        const thumbUrl = document.getElementById('editThumbUrl').value.trim();
        if (thumbUrl && thumbUrl.startsWith('http')) {
            thumbFilename = thumbUrl;
        }
        let fullmapFilename = fullmapInput.dataset.filename || '';

        if (app.editingNodeId) {
            const node = getNodeById(app.editingNodeId);
            if (node) {
                if (node.thumbnail && !node.thumbnail.startsWith('http') && thumbFilename.startsWith('http')) {
                    wusiFile.delete(node.thumbnail).catch(()=>{});
                }
                if (fullmapFilename && node.fullMap && fullmapFilename !== node.fullMap) {
                    if (!node.fullMap.startsWith('http')) wusiFile.delete(node.fullMap).catch(()=>{});
                }
                const oldThumb = node.thumbnail;
                const oldFull = node.fullMap;
                node.direction = direction;
                node.shape = shape;
                node.mapBookIndex = mapIdx;
                node.difficultyIndex = diffIdx;
                node.aliases = aliases;
                node.steps = steps;
                node.thumbnail = thumbFilename || oldThumb;
                node.fullMap = fullmapFilename || oldFull;
                delete node._tempFullMap;
                saveData(app.data).catch(()=>{});
                renderNodeList(mapIdx, diffIdx);
                showMapPage('page-node-list');
            }
        } else {
            const newNode = { id: genId(), direction, shape, mapBookIndex: mapIdx, difficultyIndex: diffIdx, aliases, steps, thumbnail: thumbFilename || '', fullMap: fullmapFilename || '' };
            app.data.nodes.push(newNode);
            saveData(app.data).catch(()=>{});
            renderNodeList(mapIdx, diffIdx);
            showMapPage('page-node-list');
        }
        app._tempNewFullMap = '';
    }

    // ================================================================
    //  导航核心（保持不变）
    // ================================================================
    function startNavigation(nodeId) {
        cancelSpeech();
        const node = getNodeById(nodeId);
        if (!node || !node.steps || node.steps.length === 0) {
            showToast('该节点无步骤');
            return;
        }

        app.navContext = {
            nodeId: node.id,
            mapBookIdx: node.mapBookIndex,
            difficultyIdx: node.difficultyIndex,
            currentStep: 0,
            steps: node.steps,
            node: node
        };
        app.voiceState = 'idle';

        document.getElementById('voiceMapSelect').value = node.mapBookIndex;
        document.getElementById('voiceDiffSelect').value = node.difficultyIndex;

        updateSelectedNodeName(node.direction + ' · ' + node.shape);

        showFullMap(nodeId);
        speakCurrentStep();
    }

    function updateSelectedNodeName(name) {
        document.getElementById('selectNodeName').textContent = name;
    }

    function clearSelectedNodeName() {
        document.getElementById('selectNodeName').textContent = '-- 未选择 --';
    }

    function speakCurrentStep() {
        if (!app.navContext) return;
        const ctx = app.navContext;
        const idx = ctx.currentStep;
        const steps = ctx.steps;

        if (idx < 0 || idx >= steps.length) {
            app.voiceState = 'idle';
            updateVoiceUI(ctx);
            return;
        }

        app.voiceState = 'speaking';
        updateVoiceUI(ctx);

        const text = steps[idx];
        const settings = app.settings;

        if (settings.customVoice) {
            speakWithCustomAudio(text, () => {
                app.voiceState = 'waitForNext';
                updateVoiceUI(ctx);
            });
        } else {
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-CN';
                utter.rate = settings.speed;
                utter.pitch = settings.pitch;
                if (settings.voiceName) {
                    const voices = window.speechSynthesis.getVoices();
                    const v = voices.find(v => v.name === settings.voiceName);
                    if (v) utter.voice = v;
                }
                utter.onend = () => { app.voiceState = 'waitForNext'; updateVoiceUI(ctx); };
                utter.onerror = () => { app.voiceState = 'waitForNext'; updateVoiceUI(ctx); };
                app.utterance = utter;
                window.speechSynthesis.speak(utter);
            } else {
                showToast('当前环境不支持语音合成');
                app.voiceState = 'waitForNext';
                updateVoiceUI(ctx);
            }
        }
    }

    function speakWithCustomAudio(text, onEnd) {
        if (!app.settings.customVoice) { if (onEnd) onEnd(); return; }
        loadFileAsBlobURL(app.settings.customVoice).then(url => {
            if (!url) { if (onEnd) onEnd(); return; }
            const audio = new Audio(url);
            audio.onended = () => { URL.revokeObjectURL(url); if (onEnd) onEnd(); };
            audio.onerror = () => { URL.revokeObjectURL(url); if (onEnd) onEnd(); };
            audio.play().catch(() => { if (onEnd) onEnd(); });
        }).catch(() => { if (onEnd) onEnd(); });
    }

    function nextStep() {
        if (!app.navContext) return;
        cancelSpeech();
        const ctx = app.navContext;
        if (ctx.currentStep < ctx.steps.length - 1) {
            ctx.currentStep++;
            speakCurrentStep();
        } else {
            showToast('已经是最后一步');
        }
    }

    function prevStep() {
        if (!app.navContext) return;
        cancelSpeech();
        const ctx = app.navContext;
        if (ctx.currentStep > 0) {
            ctx.currentStep--;
            speakCurrentStep();
        } else {
            showToast('已经是第一步');
        }
    }

    function cancelSpeech() {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        if (app.utterance) { app.utterance = null; }
        app.voiceState = 'idle';
    }

    function updateVoiceUI(ctx) {
        const stepNumber = document.getElementById('navStepNumber');
        const stepText = document.getElementById('navStepText');
        const stepProgress = document.getElementById('navStepProgress');
        const prevBtn = document.getElementById('prevStepBtn');
        const nextBtn = document.getElementById('nextStepBtn');
        const stateLabel = document.getElementById('navStateLabel');

        if (!ctx) {
            stepNumber.textContent = '';
            stepText.textContent = '准备就绪，请选择节点或说出指令';
            stepProgress.textContent = '';
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            stateLabel.textContent = '空闲';
            return;
        }

        const idx = ctx.currentStep;
        const total = ctx.steps.length;
        stepNumber.textContent = `第 ${idx + 1} 步 / 共 ${total} 步`;
        stepText.textContent = ctx.steps[idx] || '无步骤';
        stepProgress.textContent = `${((idx + 1) / total * 100).toFixed(0)}%`;

        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx === total - 1;

        if (app.voiceState === 'speaking') stateLabel.textContent = '播报中';
        else if (app.voiceState === 'waitForNext') stateLabel.textContent = '等待下一步';
        else stateLabel.textContent = '空闲';
    }

    // ================================================================
    //  完整大图
    // ================================================================
    async function showFullMap(nodeId) {
        const node = getNodeById(nodeId);
        const img = document.getElementById('voiceFullmapImg');
        const emptyDiv = document.getElementById('voiceFullmapEmpty');

        if (app._currentFullmapURL) {
            URL.revokeObjectURL(app._currentFullmapURL);
            app._currentFullmapURL = null;
        }

        if (!node || !node.fullMap) {
            img.style.display = 'none';
            emptyDiv.style.display = 'block';
            emptyDiv.innerHTML = '<div class="icon">🖼️</div>该节点未上传完整地图';
            return;
        }

        try {
            const url = await loadFileAsBlobURL(node.fullMap);
            if (url) {
                img.src = url;
                img.style.display = 'block';
                emptyDiv.style.display = 'none';
                app._currentFullmapURL = url;
                img.onclick = () => openZoomMap(url);
            } else {
                throw new Error('加载失败');
            }
        } catch (e) {
            img.style.display = 'none';
            emptyDiv.style.display = 'block';
            emptyDiv.innerHTML = '<div class="icon">⚠️</div>地图加载失败';
        }
    }

    // ================================================================
    //  节点选择模态框（按方向分组）
    // ================================================================
    function openNodeSelectModal() {
        const modal = document.getElementById('nodeSelectModal');
        const list = document.getElementById('nodeSelectList');

        const mapIdx = parseInt(document.getElementById('voiceMapSelect').value);
        const diffIdx = parseInt(document.getElementById('voiceDiffSelect').value);
        const nodes = getNodesFor(mapIdx, diffIdx);

        if (nodes.length === 0) {
            list.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:30px 0;">当前模式下暂无节点</div>';
        } else {
            const groups = {};
            const dirOrder = ['左', '右', '南', '北', '东', '西', '其他'];
            nodes.forEach(node => {
                const dir = node.direction || '其他';
                if (!groups[dir]) groups[dir] = [];
                groups[dir].push(node);
            });
            const sortedEntries = Object.entries(groups).sort((a, b) => {
                const ia = dirOrder.indexOf(a[0]);
                const ib = dirOrder.indexOf(b[0]);
                if (ia === -1 && ib === -1) return a[0].localeCompare(b[0]);
                if (ia === -1) return 1;
                if (ib === -1) return -1;
                return ia - ib;
            });

            let html = '';
            for (const [dir, dirNodes] of sortedEntries) {
                html += `<div class="group-divider">${dir} <span class="badge">${dirNodes.length}</span></div>`;
                for (const node of dirNodes) {
                    const aliasHint = (node.aliases && node.aliases.length > 0) ? '（别名：' + node.aliases.join(', ') + '）' : '';
                    html += `<div class="node-option" data-node-id="${node.id}">
                        <span class="dir">${node.direction}</span>
                        <span class="shape">${node.shape}</span>
                        <span class="alias-hint">${aliasHint}</span>
                    </div>`;
                }
            }
            list.innerHTML = html;

            list.querySelectorAll('.node-option').forEach(el => {
                el.addEventListener('click', () => {
                    const nodeId = el.dataset.nodeId;
                    modal.classList.remove('show');
                    startNavigation(nodeId);
                });
            });
        }

        modal.classList.add('show');
    }

    document.getElementById('closeNodeSelectModal').onclick = () => {
        document.getElementById('nodeSelectModal').classList.remove('show');
    };
    document.getElementById('nodeSelectModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) document.getElementById('nodeSelectModal').classList.remove('show');
    });

    // ================================================================
    //  语音识别（保持不变）
    // ================================================================
    function startListening() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            showToast('当前浏览器不支持语音识别');
            return;
        }
        if (app.isListening) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognizer = new SpeechRecognition();
        recognizer.lang = 'zh-CN';
        recognizer.continuous = true;
        recognizer.interimResults = false;
        recognizer.maxAlternatives = 1;

        recognizer.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    transcript += event.results[i][0].transcript;
                }
            }
            if (transcript) {
                processVoiceCommand(transcript);
            }
        };

        recognizer.onerror = (event) => {
            console.warn('语音识别错误:', event.error);
            if (event.error === 'not-allowed') {
                showToast('请允许使用麦克风');
                app.isListening = false;
                updateRecordingStatus();
                return;
            }
            if (app.isListening) {
                setTimeout(() => {
                    if (app.isListening) { try { recognizer.start(); } catch(_) {} }
                }, 500);
            }
        };

        recognizer.onend = () => {
            if (app.isListening) { try { recognizer.start(); } catch(_) {} }
        };

        try {
            recognizer.start();
            app.isListening = true;
            app.recognizer = recognizer;
            app._recRestartCount = 0;
            updateRecordingStatus();
        } catch (e) {
            showToast('语音启动失败');
        }
    }

    function stopListening() {
        if (!app.isListening) return;
        if (app.recognizer) { try { app.recognizer.stop(); } catch(_) {} app.recognizer = null; }
        app.isListening = false;
        updateRecordingStatus();
    }

    function toggleListening() {
        if (app.isListening) stopListening();
        else startListening();
        updateVoiceButton();
    }

    function updateVoiceButton() {
        const btn = document.getElementById('navVoiceBtn');
        const dot = document.getElementById('navVoiceDot');
        const label = document.getElementById('navVoiceLabel');

        if (app.isListening) {
            label.textContent = '停止录音';
            dot.className = 'dot listening';
        } else {
            label.textContent = '开始录音';
            dot.className = 'dot';
            if (app.voiceState === 'speaking') dot.className = 'dot speaking';
        }
    }

    function updateRecordingStatus() {
        const recIcon = document.getElementById('recIcon');
        const statusText = document.getElementById('recStatusText');
        if (app.isListening) {
            recIcon.className = 'rec-icon active';
            statusText.textContent = '🎤 正在录音中，随时说出指令，点击「停止录音」结束';
        } else {
            recIcon.className = 'rec-icon inactive';
            statusText.textContent = '录音已停止，点击「开始录音」持续聆听';
        }
    }

    // ================================================================
    //  语音指令处理（保持不变）
    // ================================================================
    function processVoiceCommand(text) {
        console.log('语音输入:', text);
        const trimmed = text.trim().toLowerCase();
        if (!trimmed) return;

        const modePattern = /设置模式(?:为)?\s*(.+?)\s+(.+)/;
        const modeMatch = trimmed.match(modePattern);
        if (modeMatch) {
            const mapName = modeMatch[1].trim();
            const diffName = modeMatch[2].trim();
            const d = app.data;
            const mapIdx = d.mapBooks.findIndex(m => m === mapName);
            const diffIdx = d.difficulties.findIndex(di => di === diffName);
            if (mapIdx !== -1 && diffIdx !== -1) {
                app.currentMapIdx = mapIdx;
                app.currentDiffIdx = diffIdx;
                document.getElementById('voiceMapSelect').value = mapIdx;
                document.getElementById('voiceDiffSelect').value = diffIdx;
                clearVoiceNavigation();
                speakText(`已设置模式为${mapName}${diffName}`);
            } else {
                speakText('未识别到对应模式');
            }
            return;
        }

        const thisPattern = /这是(.+)/;
        const thisMatch = trimmed.match(thisPattern);
        if (thisMatch) {
            const body = thisMatch[1].trim();
            const parsed = parseDirectionAlias(body);
            if (parsed) {
                const mapIdx = parseInt(document.getElementById('voiceMapSelect').value);
                const diffIdx = parseInt(document.getElementById('voiceDiffSelect').value);
                const node = matchNodeByDirectionAndAlias(parsed.direction, parsed.alias, mapIdx, diffIdx);
                if (node) {
                    startNavigation(node.id);
                } else {
                    speakText('未找到匹配的节点');
                }
            } else {
                speakText('方向或别名识别失败，请说这是右锤子门之类的');
            }
            return;
        }

        if (trimmed.includes('下一步') || trimmed.includes('好') || trimmed.includes('走') || trimmed.includes('行') || trimmed.includes('继续')) {
            nextStep();
            return;
        }
        if (trimmed.includes('上一步') || trimmed.includes('返回') || trimmed.includes('后退')) {
            prevStep();
            return;
        }
    }

    function parseDirectionAlias(text) {
        let cleaned = text.replace(/[，,、。.!！?？\s]/g, '');
        let body = cleaned;
        if (body.startsWith('这是')) body = body.slice(2);
        if (body.endsWith('图')) body = body.slice(0, -1);

        const directions = ['左', '右', '南', '北', '东', '西'];
        let direction = '';
        let rest = body;
        for (const d of directions) {
            if (body.startsWith(d)) { direction = d; rest = body.slice(d.length); break; }
        }
        if (!direction) {
            for (const d of directions) {
                if (body.endsWith(d)) { direction = d; rest = body.slice(0, -d.length); break; }
            }
        }
        if (direction && rest) return { direction, alias: rest };
        return null;
    }

    function matchNodeByDirectionAndAlias(direction, alias, mapIdx, diffIdx) {
        const nodes = getNodesFor(mapIdx, diffIdx);
        for (const n of nodes) {
            if (n.direction === direction && (n.aliases || []).some(a => a === alias)) return n;
        }
        return null;
    }

    function speakText(text) {
        if (window.speechSynthesis) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = app.settings.speed;
            utter.pitch = app.settings.pitch;
            if (app.settings.voiceName) {
                const voices = window.speechSynthesis.getVoices();
                const v = voices.find(v => v.name === app.settings.voiceName);
                if (v) utter.voice = v;
            }
            window.speechSynthesis.speak(utter);
        }
    }

    // ================================================================
    //  语音面板初始化
    // ================================================================
    function clearVoiceNavigation() {
        cancelSpeech();
        app.navContext = null;
        updateVoiceUI(null);
        const img = document.getElementById('voiceFullmapImg');
        const emptyDiv = document.getElementById('voiceFullmapEmpty');
        img.style.display = 'none';
        emptyDiv.style.display = 'block';
        emptyDiv.innerHTML = '<div class="icon">🖼️</div>选择节点后显示完整地图';
        if (app._currentFullmapURL) { URL.revokeObjectURL(app._currentFullmapURL); app._currentFullmapURL = null; }
        clearSelectedNodeName();
    }

    function initVoicePanel() {
        const mapSelect = document.getElementById('voiceMapSelect');
        const diffSelect = document.getElementById('voiceDiffSelect');
        const d = app.data;

        mapSelect.innerHTML = d.mapBooks.map((name, i) => `<option value="${i}">${name}</option>`).join('');
        diffSelect.innerHTML = d.difficulties.map((name, i) => `<option value="${i}">${name}</option>`).join('');

        mapSelect.value = app.currentMapIdx;
        diffSelect.value = app.currentDiffIdx;

        mapSelect.onchange = () => {
            app.currentMapIdx = parseInt(mapSelect.value);
            clearVoiceNavigation();
            updateRecordingStatus();
        };
        diffSelect.onchange = () => {
            app.currentDiffIdx = parseInt(diffSelect.value);
            clearVoiceNavigation();
            updateRecordingStatus();
        };

        document.getElementById('selectNodeBtn').onclick = openNodeSelectModal;

        document.getElementById('nextStepBtn').onclick = nextStep;
        document.getElementById('prevStepBtn').onclick = prevStep;
        document.getElementById('navVoiceBtn').onclick = toggleListening;

        updateVoiceButton();
        updateRecordingStatus();
    }

    // ================================================================
    //  设置页面
    // ================================================================
    function initSettings() {
        const speedSlider = document.getElementById('speedSlider');
        const pitchSlider = document.getElementById('pitchSlider');
        const voiceSelect = document.getElementById('voiceSelect');
        const voiceFileInput = document.getElementById('voiceFileInput');
        const voiceFileStatus = document.getElementById('voiceFileStatus');
        const voiceFileClear = document.getElementById('voiceFileClear');

        speedSlider.value = app.settings.speed;
        pitchSlider.value = app.settings.pitch;
        document.getElementById('speedValue').textContent = app.settings.speed;
        document.getElementById('pitchValue').textContent = app.settings.pitch;

        speedSlider.oninput = () => {
            const val = parseFloat(speedSlider.value);
            app.settings.speed = val;
            document.getElementById('speedValue').textContent = val;
            saveSettings(app.settings);
        };
        pitchSlider.oninput = () => {
            const val = parseFloat(pitchSlider.value);
            app.settings.pitch = val;
            document.getElementById('pitchValue').textContent = val;
            saveSettings(app.settings);
        };

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '<option value="">系统默认</option>' + voices.map(v => `<option value="${v.name}" ${app.settings.voiceName === v.name ? 'selected' : ''}>${v.name}</option>`).join('');
        }
        loadVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        voiceSelect.onchange = () => {
            app.settings.voiceName = voiceSelect.value;
            saveSettings(app.settings);
        };

        if (app.settings.customVoice) voiceFileStatus.textContent = '已上传：' + app.settings.customVoice;

        voiceFileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const ext = file.name.endsWith('.mp3') ? '.mp3' : file.name.endsWith('.wav') ? '.wav' : '.ogg';
                const filename = generateFileName(ext);
                try {
                    await wusiFile.save(filename, file);
                    if (app.settings.customVoice) wusiFile.delete(app.settings.customVoice).catch(()=>{});
                    app.settings.customVoice = filename;
                    saveSettings(app.settings);
                    voiceFileStatus.textContent = '已上传：' + filename;
                    showToast('自定义语音包已保存');
                } catch (e) { showToast('上传失败: ' + e.message); }
            }
        };

        voiceFileClear.onclick = async () => {
            if (app.settings.customVoice) {
                await wusiFile.delete(app.settings.customVoice).catch(()=>{});
                app.settings.customVoice = '';
                saveSettings(app.settings);
                voiceFileStatus.textContent = '未上传';
                showToast('已清除语音包');
            }
        };

        // ---- 图片源URL设置 ----
        const imageUrlInput = document.getElementById('imageBaseUrl');
        const saveUrlBtn = document.getElementById('saveImageUrlBtn');
        const batchSyncBtn = document.getElementById('batchSyncThumbBtn');

        imageUrlInput.value = app.settings.imageBaseUrl || '';

        saveUrlBtn.onclick = () => {
            const url = imageUrlInput.value.trim();
            if (url && !url.endsWith('/')) {
                app.settings.imageBaseUrl = url + '/';
            } else {
                app.settings.imageBaseUrl = url;
            }
            saveSettings(app.settings);
            showToast('图片URL已保存');
            const syncBtn = document.getElementById('syncThumbBtn');
            if (syncBtn) syncBtn.style.display = app.settings.imageBaseUrl ? 'inline-flex' : 'none';
        };

        batchSyncBtn.onclick = batchSyncAll;
    }

    // ================================================================
    //  启动
    // ================================================================
    document.addEventListener('DOMContentLoaded', () => {
        renderHome();
        initVoicePanel();
        initSettings();

        document.querySelectorAll('.bottom-nav .nav-tab').forEach(btn => {
            btn.addEventListener('click', () => { switchTab(btn.dataset.tab); });
        });

        switchTab('map');

        window.addEventListener('beforeunload', () => {
            stopListening();
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });
    });
</script>
